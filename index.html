<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoChamber IDE</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #fff; text-shadow: 0 0 10px #00ff00; margin-bottom: 5px; }
        .container { width: 85%; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 200px; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 15px; font-size: 18px; outline: none; box-sizing: border-box; resize: none; }
        #debug-output { width: 100%; background: #080808; color: #00ccff; padding: 15px; font-size: 14px; border: 1px solid #333; border-top: none; white-space: pre-wrap; box-sizing: border-box; margin-bottom: 20px; min-height: 20px; }
        .controls { margin-bottom: 20px; gap: 10px; display: flex; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: inherit; }
        button:hover { background: #fff; }
        #output { width: 100%; min-height: 50px; background: #000; border: 1px dashed #00ff00; padding: 15px; box-sizing: border-box; font-size: 1.5em; }
        .label { color: #888; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>ECHO CHAMBER v1.0</h1>
    <div class="container">
        <div class="label">Code Editor:</div>
        <textarea id="code" oninput="runEcho()" placeholder="Write code here...">$ HI! Example
Assss..........@ $ H
Assss.........@  $ I
Assssssss.....@ $ !</textarea>
        <div id="debug-output"></div>

        <div class="controls">
            <button id="modeBtn" onclick="toggleMode()">MODE: NUMBERS ONLY</button>
        </div>

        <div class="label">Result:</div>
        <div id="output"></div>
    </div>

    <script>
        let showCommands = false;
        
        function toggleMode() {
            showCommands = !showCommands;
            document.getElementById('modeBtn').innerText = showCommands ? "MODE: COMMAND-INFO" : "MODE: NUMBERS ONLY";
            runEcho();
        }

        function runEcho() {
            const rawCode = document.getElementById('code').value;
            const outputElement = document.getElementById('output');
            const debugElement = document.getElementById('debug-output');
            
            let lines = rawCode.split('\n');
            let rooms = new Array(300).fill(0);
            let pointer = 0;
            let finalOutput = "";
            let debugLines = [];

            for (let line of lines) {
                let currentLineDebug = "";
                let codePart = line.split('$')[0]; 

                for (let char of codePart) {
                    let isCommand = "Asa@()[].".includes(char);
                    
                    if (isCommand) {
                        // Сначала выполняем действие команды
                        if (char === 'A') rooms[pointer] = 127;
                        else if (char === 's') rooms[pointer] = Math.max(0, rooms[pointer] - 10);
                        else if (char === 'a') rooms[pointer] = Math.min(127, rooms[pointer] + 10);
                        else if (char === '(') pointer = Math.max(0, pointer - 1);
                        else if (char === ')') pointer = Math.min(rooms.length - 1, pointer + 1);
                        else if (char === '@') finalOutput += String.fromCharCode(rooms[pointer]);

                        // Фиксируем значение для дебага ДО затухания
                        let val = rooms[pointer];
                        currentLineDebug += (showCommands ? `${char}-${val} ` : `${val} `);
                        
                        // Затухание происходит ПОСЛЕ команды, но только если это не @
                        if (char !== '@') {
                            for(let i=0; i<rooms.length; i++) if(rooms[i]>0) rooms[i]--;
                        }
                    } else if (char === ' ') {
                        currentLineDebug += "  ";
                    }
                }
                debugLines.push(currentLineDebug);
            }

            outputElement.innerText = finalOutput || "> Silence...";
            debugElement.innerText = debugLines.join('\n');
        }

        runEcho();
    </script>
</body>
</html>
