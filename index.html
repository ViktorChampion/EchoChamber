<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoChamber IDE</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #fff; text-shadow: 0 0 10px #00ff00; margin-bottom: 5px; }
        p { margin-bottom: 20px; color: #888; }
        textarea { width: 80%; height: 250px; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 15px; font-size: 16px; margin-bottom: 10px; outline: none; }
        .controls { margin-bottom: 20px; }
        button { background: #00ff00; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #output { width: 80%; min-height: 100px; background: #000; border: 1px dashed #00ff00; padding: 15px; white-space: pre-wrap; word-wrap: break-word; font-size: 1.2em; }
        .status { font-size: 0.8em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>ECHO CHAMBER v1.0</h1>
    <p>Sound decays with every passing tick...</p>

    <textarea id="code" placeholder="A - Scream (127), s - Whisper (-10), + - Resonate (+10), @ - Listen, [] - Mirror Loop, $ - Comment">
$ HI! Example
Assss..........@ $ H
Assss.........@  $ I
Assssssss.....@ $ !
    </textarea>

    <div class="controls">
        <button onclick="runEcho()">TRIGGER RESONANCE</button>
    </div>

    <div id="output"></div>
    <div class="status" id="stats"></div>

    <script>
        function runEcho() {
            const rawCode = document.getElementById('code').value;
            const outputElement = document.getElementById('output');
            const statsElement = document.getElementById('stats');
            
            // 1. Pre-processing: Remove comments
            let lines = rawCode.split('\n');
            let tempCode = "";
            for (let line of lines) {
                tempCode += line.split('$')[0]; 
            }
            
            // 2. Filter commands: Only valid characters trigger ticks
            // This ensures spaces and newlines don't break your timing
            const code = tempCode.replace(/[^As@()\[\]\+\.]/g, '');
            
            let rooms = new Array(300).fill(0);
            let pointer = 0;
            let pc = 0;
            let output = "";
            let loopStack = [];
            let ticks = 0;

            const decay = () => {
                for (let i = 0; i < rooms.length; i++) {
                    if (rooms[i] > 0) rooms[i]--;
                }
            };

            while (pc < code.length && ticks < 100000) {
                let cmd = code[pc];
                ticks++;

                if (cmd === 'A') {
                    rooms[pointer] = 127;
                } else if (cmd === 's') {
                    rooms[pointer] = Math.max(0, rooms[pointer] - 10);
                } else if (cmd === '+') {
                    rooms[pointer] = Math.min(127, rooms[pointer] + 10);
                } else if (cmd === '(') {
                    pointer = Math.max(0, pointer - 1);
                } else if (cmd === ')') {
                    pointer = Math.min(rooms.length - 1, pointer + 1);
                } else if (cmd === '@') {
                    output += String.fromCharCode(rooms[pointer]);
                } else if (cmd === '[') {
                    let v = rooms[pointer];
                    if (v > 0) {
                        loopStack.push({ start: pc, count: v });
                    } else {
                        let depth = 1;
                        while (depth > 0 && pc < code.length) {
                            pc++;
                            if (code[pc] === '[') depth++;
                            if (code[pc] === ']') depth--;
                        }
                    }
                } else if (cmd === ']') {
                    if (loopStack.length > 0) {
                        let currentLoop = loopStack[loopStack.length - 1];
                        currentLoop.count--;
                        if (currentLoop.count > 0 && rooms[pointer] > 0) {
                            pc = currentLoop.start;
                        } else {
                            loopStack.pop();
                        }
                    }
                }

                decay();
                pc++;
            }

            outputElement.innerText = output || "> Silence...";
            statsElement.innerText = `Executed in ${ticks} ticks.`;
        }
    </script>
</body>
</html>
