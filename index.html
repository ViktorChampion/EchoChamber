<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EchoChamber IDE v1.0</title>
    <style>
        body { background: #1a1a1a; color: #ff5500; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #fff; text-shadow: 0 0 10px #ff5500; margin-bottom: 5px; }
        .container { width: 85%; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 200px; background: #000; color: #ff5500; border: 1px solid #ff5500; padding: 15px; font-size: 18px; outline: none; box-sizing: border-box; resize: none; }
        #debug-output { width: 100%; background: #080808; color: #00ccff; padding: 15px; font-size: 14px; border: 1px solid #333; border-top: none; white-space: pre-wrap; box-sizing: border-box; margin-bottom: 10px; min-height: 20px; overflow-x: auto; }
        .input-area { margin-bottom: 20px; display: flex; flex-direction: column; }
        input { background: #000; color: #ff5500; border: 1px solid #ff5500; padding: 10px; font-family: inherit; font-size: 16px; outline: none; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { background: #ff5500; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: inherit; }
        button:hover { background: #fff; }
        #output { width: 100%; min-height: 50px; background: #000; border: 1px dashed #ff5500; padding: 15px; box-sizing: border-box; font-size: 1.5em; }
        .label { color: #888; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>ECHO CHAMBER v1.0</h1>
    <div class="container">
        <div class="label">Code Editor:</div>
        <textarea id="code" oninput="runEcho()" placeholder="Write code here...">$ Classic Echo: Read and Print
,[@,]</textarea>
        <div id="debug-output"></div>

        <div class="input-area">
            <div class="label">Input Buffer:</div>
            <input type="text" id="user-input" oninput="runEcho()" placeholder="Type here...">
        </div>

        <div class="controls">
            <button id="modeBtn" onclick="toggleMode()">MODE: NUMBERS ONLY</button>
        </div>

        <div class="label">Result:</div>
        <div id="output"></div>
    </div>

    <script>
        let showCommands = false;
        function toggleMode() {
            showCommands = !showCommands;
            document.getElementById('modeBtn').innerText = showCommands ? "MODE: COMMAND-INFO" : "MODE: NUMBERS ONLY";
            runEcho();
        }

        function runEcho() {
            const rawCode = document.getElementById('code').value;
            const userInput = document.getElementById('user-input').value;
            const outputElement = document.getElementById('output');
            const debugElement = document.getElementById('debug-output');
            
            let cleanCode = rawCode.split('\n').map(l => l.split('$')[0]).join('').replace(/\s/g, '');
            let rooms = new Array(300).fill(0);
            let pointer = 0;
            let inputPtr = 0;
            let finalOutput = "";
            let debugLog = "";
            let pc = 0;
            let ticks = 0;
            let outputChars = 0;

            const decay = () => {
                for(let j=0; j<rooms.length; j++) if(rooms[j]>0) rooms[j]--;
            };

            while (pc < cleanCode.length && ticks < 10000) {
                let char = cleanCode[pc];
                ticks++;

                if (char === '+') rooms[pointer] = Math.min(255, rooms[pointer] + 1);
                else if (char === '-') rooms[pointer] = Math.max(0, rooms[pointer] - 1);
                else if (char === '(') { pointer = Math.max(0, pointer - 1); decay(); }
                else if (char === ')') { pointer = Math.min(rooms.length - 1, pointer + 1); decay(); }
                else if (char === '@') { 
                    if (outputChars < 500) {
                        finalOutput += String.fromCharCode(rooms[pointer]);
                        outputChars++;
                    }
                }
                else if (char === ',') { 
                    rooms[pointer] = inputPtr < userInput.length ? userInput.charCodeAt(inputPtr++) : 0; 
                    decay(); 
                }
                else if (char === '[') {
                    // Специальные макросы
                    let sub = cleanCode.substring(pc + 1, cleanCode.indexOf(']', pc));
                    if (sub === '-') { rooms[pointer] = 0; pc = cleanCode.indexOf(']', pc); }
                    else if (sub === '+') { rooms[pointer] = 127; pc = cleanCode.indexOf(']', pc); }
                    else if (sub === '++') { rooms[pointer] = 255; pc = cleanCode.indexOf(']', pc); }
                    else if (rooms[pointer] === 0) {
                        let depth = 1;
                        while (depth > 0) {
                            pc++;
                            if (cleanCode[pc] === '[') depth++;
                            if (cleanCode[pc] === ']') depth--;
                        }
                    }
                }
                else if (char === ']') {
                    if (rooms[pointer] !== 0) {
                        let depth = 1;
                        while (depth > 0) {
                            pc--;
                            if (cleanCode[pc] === '[') depth--;
                            if (cleanCode[pc] === ']') depth++;
                        }
                        pc--; // Возврат к '['
                    }
                }

                if ("+-@()[],".includes(char)) {
                    debugLog += (showCommands ? `${char}-${rooms[pointer]} ` : `${rooms[pointer]} `);
                }
                pc++;
            }

            outputElement.innerText = finalOutput || "> Silence...";
            debugElement.innerText = debugLog;
        }
        runEcho();
    </script>
</body>
</html>
