<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EchoChamber IDE</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #fff; text-shadow: 0 0 10px #00ff00; }
        textarea { width: 80%; height: 200px; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; font-size: 16px; margin-bottom: 10px; }
        .controls { margin-bottom: 20px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: inherit; }
        button:hover { background: #fff; }
        #output { width: 80%; min-height: 100px; background: #000; border: 1px dashed #00ff00; padding: 10px; white-space: pre-wrap; word-wrap: break-word; }
        .status { font-size: 0.8em; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>ECHO CHAMBER v1.0</h1>
    <p>The sound fades with each tick...</p>

    <textarea id="code" placeholder="Your code... (A - scream, s - whisper, @ - hear, [] - mirrors)">$ Hello World in EchoChamber
As s s s . . . . . . . . . . @ $ Prints "H"
    </textarea>

    <div class="controls">
        <button onclick="runEcho()">RUN</button>
    </div>

    <div id="output"></div>
    <div class="status" id="stats"></div>

    <script>
        function runEcho() {
    const rawCode = document.getElementById('code').value;
    const outputElement = document.getElementById('output');
    
    // 1. Убираем комментарии (всё после $)
    let lines = rawCode.split('\n');
    let cleanCode = "";
    for (let line of lines) {
        cleanCode += line.split('$')[0];
    }

    // 2. ОСТАВЛЯЕМ ТОЛЬКО КОМАНДЫ (это решит проблему с RR и пробелами)
    // Теперь пробелы, переносы строк и буквы типа 'R' не будут тратить время!
    const validCommands = "As@()[]+#."; 
    let code = "";
    for (let char of cleanCode) {
        if (validCommands.includes(char)) {
            code += char;
        }
    }
    
    let rooms = new Array(300).fill(0);
    let pointer = 0;
    let pc = 0;
    let output = "";
    let loopStack = [];
    let ticks = 0;

    const decay = () => {
        for (let i = 0; i < rooms.length; i++) {
            if (rooms[i] > 0) rooms[i]--;
        }
    };

    while (pc < code.length && ticks < 100000) {
        let cmd = code[pc];
        ticks++;

        if (cmd === 'A') rooms[pointer] = 127;
        else if (cmd === 's') rooms[pointer] = Math.max(0, rooms[pointer] - 10);
        else if (cmd === '+') rooms[pointer] = Math.min(127, rooms[pointer] + 10);
        else if (cmd === '(') pointer = Math.max(0, pointer - 1);
        else if (cmd === ')') pointer = min(rooms.length - 1, pointer + 1);
        else if (cmd === '@') output += String.fromCharCode(rooms[pointer]);
        else if (cmd === '[') {
            let v = rooms[pointer];
            if (v > 0) loopStack.push({ start: pc, count: v });
            else {
                let depth = 1;
                while (depth > 0 && pc < code.length) {
                    pc++;
                    if (code[pc] === '[') depth++;
                    if (code[pc] === ']') depth--;
                }
            }
        } else if (cmd === ']') {
            if (loopStack.length > 0) {
                let currentLoop = loopStack[loopStack.length - 1];
                currentLoop.count--;
                if (currentLoop.count > 0 && rooms[pointer] > 0) pc = currentLoop.start;
                else loopStack.pop();
            }
        }

        decay();
        pc++;
    }
    outputElement.innerText = output || "> Тишина...";
}

    </script>
</body>
</html>
